<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tamara - Content Staging</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.7;
    color: #1a1612;
    background: #f7f3ee;
    padding: 40px 20px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 400; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #7a6f65; margin-bottom: 32px; }
  .article-list { list-style: none; }
  .article-list li {
    padding: 16px 0;
    border-bottom: 1px solid #e0d8cf;
  }
  .article-list a {
    color: #1a1612;
    text-decoration: none;
    font-size: 16px;
  }
  .article-list a:hover { color: #b85c38; }
  .article-meta { font-size: 12px; color: #7a6f65; margin-top: 4px; }
  .status-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid #e0d8cf;
    color: #7a6f65;
    margin-left: 8px;
  }
  .empty { color: #7a6f65; font-style: italic; padding: 40px 0; }
</style>
</head>
<body>
<div class="container">
<h1>Tamara - Content Staging</h1>
<p class="subtitle">Preview of articles in the content pipeline</p>
<ul class="article-list"><li><a href="/remote-renovation/" dir="rtl">איך לנהל שיפוץ בלונדון מישראל</a><div class="article-meta"><span class="status-tag">published</span></div></li></ul>
</div>
</body>
</html>
