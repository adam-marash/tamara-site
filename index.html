<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tamar Creative - עיצוב פנים בלונדון</title>
<meta name="description" content="מאמרים ומדריכים על עיצוב פנים, שיפוץ וקניית נכס בלונדון - מאת תמר קריאייטיב סטודיו">
<link rel="icon" type="image/png" href="/he/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.8;
    color: #717070;
    background: #fff;
    direction: rtl;
  }

  /* Header */
  header {
    border-bottom: 1px solid #e8e8e8;
    padding: 20px 0;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 40px;
  }
  .logo-link { display: block; }
  .logo { height: 65px; width: auto; }
  nav { display: flex; gap: 32px; }
  nav a {
    color: #666;
    text-decoration: none;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  nav a:hover { color: #c88a2e; }

  /* Article */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }
  h1 {
    font-size: 32px;
    font-weight: 300;
    color: #717070;
    margin-bottom: 8px;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .meta {
    font-size: 13px;
    color: #999;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid #e8e8e8;
  }
  h2 {
    font-size: 22px;
    font-weight: 400;
    color: #717070;
    margin: 40px 0 16px;
  }
  h3 {
    font-size: 17px;
    font-weight: 500;
    color: #717070;
    margin: 28px 0 10px;
  }
  p { margin-bottom: 18px; color: #717070; }
  ul, ol {
    margin-bottom: 18px;
    padding-right: 24px;
  }
  li { margin-bottom: 8px; color: #717070; }
  blockquote {
    border-right: 3px solid #c88a2e;
    padding: 16px 24px;
    margin: 24px 0;
    color: #666;
    background: #fafafa;
  }
  img { max-width: 100%; height: auto; margin: 20px 0; }
  table { width: 100%; border-collapse: collapse; margin: 24px 0; }
  th, td {
    padding: 10px 14px;
    border: 1px solid #e8e8e8;
    text-align: right;
    font-size: 14px;
    color: #717070;
  }
  th { background: #fafafa; font-weight: 500; color: #717070; }
  a { color: #c88a2e; text-decoration: none; }
  a:hover { color: #a06e1a; }
  code { background: #f5f5f5; padding: 2px 6px; font-size: 14px; }
  pre {
    background: #2a2a2a;
    color: #e8e8e8;
    padding: 20px;
    overflow-x: auto;
    margin: 20px 0;
    border-radius: 2px;
  }
  pre code { background: none; padding: 0; }

  /* Footer */
  footer {
    background: #fff;
    padding: 40px 0;
    margin-top: 64px;
  }
  .footer-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    text-align: center;
  }
  .houzz-badge { height: 80px; width: auto; margin-bottom: 20px; }
  .footer-social {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .social-icon {
    width: 32px;
    height: 32px;
    opacity: 0.9;
    transition: opacity 0.2s;
    margin: 0;
  }
  .social-icon:hover { opacity: 1; }
  .footer-text p {
    color: #717070;
    font-size: 13px;
    font-weight: 300;
    margin-bottom: 4px;
  }

  /* Index page */
  .index-intro {
    max-width: 720px;
    margin: 48px auto 0;
    padding: 0 24px;
  }
  .index-intro h1 {
    font-size: 28px;
    font-weight: 300;
    margin-bottom: 8px;
  }
  .index-intro p {
    font-size: 15px;
    color: #999;
    margin-bottom: 0;
  }
  .article-list {
    max-width: 720px;
    margin: 32px auto 0;
    padding: 0 24px;
    list-style: none;
  }
  .article-list li {
    padding: 20px 0;
    border-bottom: 1px solid #e8e8e8;
    margin: 0;
  }
  .article-list a {
    color: #717070;
    font-size: 18px;
    font-weight: 300;
    text-decoration: none;
    transition: color 0.2s;
  }
  .article-list a:hover { color: #c88a2e; }
  .article-meta {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
  }
  .empty {
    max-width: 720px;
    margin: 48px auto;
    padding: 0 24px;
    color: #999;
    font-style: italic;
  }

  @media (max-width: 600px) {
    .header-inner { flex-direction: column; gap: 12px; }
    .logo { height: 48px; }
    nav { gap: 20px; }
    h1 { font-size: 24px; }
    .container { padding: 32px 16px 48px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/he/" class="logo-link">
      <img src="/he/assets/logo.png" alt="Tamar Creative - Interior Design" class="logo">
    </a>
    <nav>
      <a href="/he/">מאמרים</a>
      <a href="https://www.tamarcreative.com/about">אודות</a>
      <a href="https://www.tamarcreative.com/contact">צרו קשר</a>
    </nav>
  </div>
</header>
<div class="index-intro">
  <h1>מאמרים ומדריכים</h1>
  <p>על עיצוב פנים, שיפוץ וקניית נכס בלונדון</p>
</div>
<ul class="article-list"><li><a href="/he/remote-renovation/" dir="rtl">איך לנהל שיפוץ בלונדון מישראל</a></li></ul>

<footer>
  <div class="footer-inner">
    <div class="footer-badge">
      <img src="/he/assets/houzz-badge.png" alt="Best of Houzz 2024 Design" class="houzz-badge">
    </div>
    <div class="footer-social">
      <a href="https://www.houzz.co.uk/pro/tamarcreative" target="_blank" rel="noopener"><img src="/he/assets/houzz-icon.png" alt="houzz" class="social-icon"></a>
      <a href="https://www.pinterest.co.uk/tamarcreativestudio/" target="_blank" rel="noopener"><img src="/he/assets/pinterest-icon.png" alt="pinterest" class="social-icon"></a>
      <a href="https://www.facebook.com/TamarCreativeStudio" target="_blank" rel="noopener"><img src="/he/assets/facebook-icon.png" alt="facebook" class="social-icon"></a>
      <a href="https://www.instagram.com/tamarcreativestudio/" target="_blank" rel="noopener"><img src="/he/assets/instagram-icon.png" alt="instagram" class="social-icon"></a>
    </div>
    <div class="footer-text">
      <p>סטודיו תמר קריאייטיב</p>
      <p>לונדון | תל אביב</p>
    </div>
  </div>
</footer>
</body>
</html>
